name: lms_todo
description: "LMS Todo App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter_dotenv: ^5.2.1
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_image.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
  - .env
  - assets/images/
  - assets/images/test/
